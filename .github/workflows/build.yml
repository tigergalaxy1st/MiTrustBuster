name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout MiTrustBuster
      uses: actions/checkout@v4
      with:
        repository: tigergalaxy1st/MiTrustBuster
        path: app

    - name: Checkout XposedBridge source (for hidden API stubs)
      uses: actions/checkout@v4
      with:
        repository: rovo89/XposedBridge
        path: XposedBridge

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Build hiddenapistubs JAR and install to mavenLocal
      run: |
        cd XposedBridge
        ./gradlew :hiddenapistubs:assembleRelease --no-daemon -q
        JAR=$(find hiddenapistubs/build/libs -name "*.jar" | head -1)
        echo "Built JAR: $JAR"
        mkdir -p ~/.m2/repository/de/robv/android/xposed/api/82
        cp "$JAR" ~/.m2/repository/de/robv/android/xposed/api/82/api-82.jar
        cat > ~/.m2/repository/de/robv/android/xposed/api/82/api-82.pom << 'POM'
<?xml version="1.0" encoding="UTF-8"?>
<project>
  <modelVersion>4.0.0</modelVersion>
  <groupId>de.robv.android.xposed</groupId>
  <artifactId>api</artifactId>
  <version>82</version>
  <packaging>jar</packaging>
</project>
POM
        echo "=== Local Maven repo ===" && ls -lh ~/.m2/repository/de/robv/android/xposed/api/82/

    - name: Build Debug APK
      run: |
        cd app
        ./gradlew assembleDebug --no-daemon

    - name: Build Release APK
      run: |
        cd app
        ./gradlew assembleRelease --no-daemon

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: MiTrustBuster-Debug
        path: app/app/build/outputs/apk/debug/*.apk
        retention-days: 5

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: MiTrustBuster-Release
        path: app/app/build/outputs/apk/release/*.apk
        retention-days: 5

name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  ANDROID_HOME: /home/runner/android-sdk

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install Android SDK
        run: |
          mkdir -p "$ANDROID_HOME"
          cd "$ANDROID_HOME"
          curl -fsSL -o cmdline-tools.zip "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
          unzip -q cmdline-tools.zip
          mkdir -p cmdline-tools/latest
          [ -d "cmdline-tools/bin" ] && mv cmdline-tools/bin cmdline-tools/latest/
          [ -d "cmdline-tools/lib" ] && mv cmdline-tools/lib cmdline-tools/latest/
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH"
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-34" "build-tools;34.0.0" "platform-tools" --sdk_root="$ANDROID_HOME"
          ls "$ANDROID_HOME/platforms/android-34/android.jar"
      - name: Download and compile XposedBridge API
        run: |
          export ANDROID_HOME=/home/runner/android-sdk
          ANDROID_JAR="$ANDROID_HOME/platforms/android-34/android.jar"
          mkdir -p xposed_build/de/robv/android/xposed xposed_build/de/robv/android/xposed/callbacks xposed_build/de/robv/android/xposed/services xposed_build/android/app xposed_build/android/content/pm xposed_build/android/content/res xposed_build/android/os xposed_build/com/android/internal/os xposed_build/com/android/internal/util xposed_build/xposed/dummy xposed_build/android/os/stub xposed_build/de/robv/android/xposed/services/stub
          XB=afcc3e1e788ea44bfd00245a24b5dfe6c86aa3d0
          FILES=(
            "app/src/main/java/de/robv/android/xposed/XposedBridge.java"
            "app/src/main/java/de/robv/android/xposed/XposedHelpers.java"
            "app/src/main/java/de/robv/android/xposed/XposedInit.java"
            "app/src/main/java/de/robv/android/xposed/IXposedMod.java"
            "app/src/main/java/de/robv/android/xposed/IXposedHookLoadPackage.java"
            "app/src/main/java/de/robv/android/xposed/IXposedHookZygoteInit.java"
            "app/src/main/java/de/robv/android/xposed/IXposedHookInitPackageResources.java"
            "app/src/main/java/de/robv/android/xposed/IXposedHookCmdInit.java"
            "app/src/main/java/de/robv/android/xposed/XC_MethodHook.java"
            "app/src/main/java/de/robv/android/xposed/XC_MethodReplacement.java"
            "app/src/main/java/de/robv/android/xposed/XSharedPreferences.java"
            "app/src/main/java/de/robv/android/xposed/SELinuxHelper.java"
            "app/src/main/java/de/robv/android/xposed/DexCreator.java"
            "app/src/main/java/de/robv/android/xposed/callbacks/XCallback.java"
            "app/src/main/java/de/robv/android/xposed/callbacks/IXUnhook.java"
            "app/src/main/java/de/robv/android/xposed/callbacks/XC_LoadPackage.java"
            "app/src/main/java/de/robv/android/xposed/callbacks/XC_InitPackageResources.java"
            "app/src/main/java/de/robv/android/xposed/callbacks/XC_LayoutInflated.java"
            "app/src/main/java/de/robv/android/xposed/services/BaseService.java"
            "app/src/main/java/de/robv/android/xposed/services/BinderService.java"
            "app/src/main/java/de/robv/android/xposed/services/DirectAccessService.java"
            "app/src/main/java/de/robv/android/xposed/services/FileResult.java"
            "app/src/main/java/de/robv/android/xposed/services/ZygoteService.java"
            "app/src/main/java/android/app/AndroidAppHelper.java"
            "app/src/main/java/android/content/res/XModuleResources.java"
            "app/src/main/java/android/content/res/XResForwarder.java"
            "app/src/main/java/android/content/res/XResources.java"
            "hiddenapistubs/src/main/java/android/app/ActivityThread.java"
            "hiddenapistubs/src/main/java/android/app/LoadedApk.java"
            "hiddenapistubs/src/main/java/android/content/pm/PackageParser.java"
            "hiddenapistubs/src/main/java/android/content/res/AssetManager.java"
            "hiddenapistubs/src/main/java/android/content/res/CompatibilityInfo.java"
            "hiddenapistubs/src/main/java/android/content/res/Resources.java"
            "hiddenapistubs/src/main/java/android/content/res/TypedArray.java"
            "hiddenapistubs/src/main/java/android/os/SELinux.java"
            "hiddenapistubs/src/main/java/android/os/ServiceManager.java"
            "hiddenapistubs/src/main/java/com/android/internal/os/RuntimeInit.java"
            "hiddenapistubs/src/main/java/com/android/internal/os/ZygoteInit.java"
            "hiddenapistubs/src/main/java/com/android/internal/util/XmlUtils.java"
            "hiddenapistubs/src/main/java/xposed/dummy/XResourcesSuperClass.java"
            "hiddenapistubs/src/main/java/xposed/dummy/XTypedArraySuperClass.java"
          )
          echo "Downloading $${#FILES[@]} XposedBridge Java files..."
          for file in "$${FILES[@]}"; do
            url="https://raw.githubusercontent.com/rovo89/XposedBridge/$XB/$file"
            dest="xposed_build/$file"
            dir=$(dirname "$dest")
            mkdir -p "$dir"
            curl -fsSL -o "$dest" "$url"
          done
          echo "Compiling..."
          javac -source 8 -target 8 -cp "$ANDROID_JAR" -d xposed_build $(find xposed_build -name "*.java") 2>&1 || echo "Some classes had errors (expected)"
          mkdir -p ~/.m2/repository/de/robv/android/xposed/api/82
          jar cf ~/.m2/repository/de/robv/android/xposed/api/82/api-82.jar -C xposed_build .
          echo '<?xml version="1.0" encoding="UTF-8"?><project><modelVersion>4.0.0</modelVersion><groupId>de.robv.android.xposed</groupId><artifactId>api</artifactId><version>82</version><packaging>jar</packaging></project>' > ~/.m2/repository/de/robv/android/xposed/api/82/api-82.pom
          ls -lh ~/.m2/repository/de/robv/android/xposed/api/82/
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon
      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon
      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MiTrustBuster-Debug
          path: app/build/outputs/apk/debug/*.apk
      - name: Upload Release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MiTrustBuster-Release
          path: app/build/outputs/apk/release/*.apk

name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  ANDROID_HOME: /usr/local/lib/android/sdk

jobs:
  build-xposed-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install Android SDK
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$PATH"
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager --install "platforms;android-34" "build-tools;34.0.0"
      - name: Clone and build hiddenapistubs
        run: |
          git clone --depth 1 https://github.com/rovo89/XposedBridge.git /tmp/XB
          cd /tmp/XB
          curl -fsSL -o gradle/wrapper/gradle-wrapper.jar "https://raw.githubusercontent.com/tigergalaxy1st/MiTrustBuster/main/gradle/wrapper/gradle-wrapper.jar"
          printf 'distributionUrl=https\\://services.gradle.org/distributions/gradle-8.5-bin.zip\n' > gradle/wrapper/gradle-wrapper.properties
          printf 'buildscript { repositories { google(); mavenCentral() }; dependencies { classpath "com.android.tools.build:gradle:8.2.0" } }\nallprojects { repositories { google(); mavenCentral() } }\n' > build.gradle
          printf 'apply plugin: "com.android.library"\nandroid { namespace "de.robv.android.xposed.hiddenapistubs"; compileSdk 34; compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 } }\n' > hiddenapistubs/build.gradle
          echo 'include ":hiddenapistubs"' > settings.gradle
          export ANDROID_HOME=/usr/local/lib/android/sdk
          ./gradlew :hiddenapistubs:assembleRelease --no-daemon -q
          AAR=$(find hiddenapistubs/build -name "*.aar" | head -1)
          unzip -o "$AAR" classes.jar -d /tmp/
          mv /tmp/classes.jar /tmp/hiddenapistubs.jar
          echo "hiddenapistubs.jar: $(ls -lh /tmp/hiddenapistubs.jar | awk '{print $5}')"
      - name: Download all source files
        run: |
          mkdir -p /tmp/src/de/robv/android/xposed/callbacks
          mkdir -p /tmp/src/de/robv/android/xposed/services
          mkdir -p /tmp/src/android/app
          mkdir -p /tmp/src/android/content/res
          
          # de.robv.android.xposed package
          for f in IXposedHookCmdInit IXposedHookInitPackageResources IXposedHookLoadPackage IXposedHookZygoteInit IXposedMod SELinuxHelper XC_MethodHook XC_MethodReplacement XSharedPreferences XposedBridge XposedHelpers package-info; do
            curl -fsSL -o "/tmp/src/de/robv/android/xposed/$f.java" "https://raw.githubusercontent.com/rovo89/XposedBridge/v82/app/src/main/java/de/robv/android/xposed/$f.java"
          done
          for f in IXUnhook XC_InitPackageResources XC_LayoutInflated XC_LoadPackage XCallback package-info; do
            curl -fsSL -o "/tmp/src/de/robv/android/xposed/callbacks/$f.java" "https://raw.githubusercontent.com/rovo89/XposedBridge/v82/app/src/main/java/de/robv/android/xposed/callbacks/$f.java"
          done
          for f in BaseService BinderService DirectAccessService FileResult ZygoteService package-info; do
            curl -fsSL -o "/tmp/src/de/robv/android/xposed/services/$f.java" "https://raw.githubusercontent.com/rovo89/XposedBridge/v82/app/src/main/java/de/robv/android/xposed/services/$f.java"
          done
          
          # android package
          curl -fsSL -o "/tmp/src/android/app/AndroidAppHelper.java" "https://raw.githubusercontent.com/rovo89/XposedBridge/v82/app/src/main/java/android/app/AndroidAppHelper.java"
          curl -fsSL -o "/tmp/src/android/app/package-info.java" "https://raw.githubusercontent.com/rovo89/XposedBridge/v82/app/src/main/java/android/app/package-info.java"
          for f in MiuiResources XModuleResources XResForwarder XResources package-info; do
            curl -fsSL -o "/tmp/src/android/content/res/$f.java" "https://raw.githubusercontent.com/rovo89/XposedBridge/v82/app/src/main/java/android/content/res/$f.java"
          done
          
          # Apache Commons Lang3 - clone from repo and copy
          cp -r /tmp/XB/app/src/main/apacheCommonsLang/external /tmp/src/
          
          echo "Downloaded: $(find /tmp/src -name "*.java" | wc -l) Java files"
      - name: Compile all source files
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          mkdir -p /tmp/xposed_jar
          javac -classpath "/tmp/hiddenapistubs.jar:$ANDROID_HOME/platforms/android-34/android.jar" \
                -d /tmp/xposed_jar \
                -source 1.8 -target 1.8 \
                -encoding UTF-8 \
                $(find /tmp/src -name "*.java") 2>&1 | head -30
          echo "---"
          echo "Compiled: $(find /tmp/xposed_jar -name "*.class" | wc -l) class files"
      - name: Package JAR
        run: |
          cd /tmp/xposed_jar
          jar cf /tmp/api-82.jar .
          printf '<?xml version="1.0"?><project><modelVersion>4.0.0</modelVersion><groupId>de.robv.android.xposed</groupId><artifactId>api</artifactId><version>82</version></project>' > /tmp/api-82.pom
          echo "api-82.jar: $(ls -lh /tmp/api-82.jar | awk '{print $5}')"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xposed-api
          path: /tmp/api-82.jar

  build-apk:
    runs-on: ubuntu-latest
    needs: build-xposed-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Download and install API
        uses: actions/download-artifact@v4
        with:
          name: xposed-api
          path: /tmp
      - name: Install to mavenLocal
        run: |
          mkdir -p ~/.m2/repository/de/robv/android/xposed/api/82
          cp /tmp/api-82.jar ~/.m2/repository/de/robv/android/xposed/api/82/
          printf '<?xml version="1.0"?><project><modelVersion>4.0.0</modelVersion><groupId>de.robv.android.xposed</groupId><artifactId>api</artifactId><version>82</version></project>' > ~/.m2/repository/de/robv/android/xposed/api/82/api-82.pom
      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug assembleRelease --no-daemon
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: MiTrustBuster-Debug
          path: app/build/outputs/apk/debug/*.apk
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: MiTrustBuster-Release
          path: app/build/outputs/apk/release/*.apk

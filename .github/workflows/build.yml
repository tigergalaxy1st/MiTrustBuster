name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Download XposedBridge source and build API JAR
      run: |
        echo "Fetching XposedBridge source file list..."
        TREE=$(curl -sSL -H "Accept: application/vnd.github.v3+json" \
          "https://api.github.com/repos/rovo89/XposedBridge/git/trees/art?recursive=1")
        
        mkdir -p xposed_src/de/robv/android/xposed/callbacks xposed_src/de/robv/android/xposed/services xposed_src/external
        
        echo "$TREE" | python3 -c "
import json, sys, urllib.request, os
data = json.load(sys.stdin)
for item in data['tree']:
    path = item['path']
    if path.startswith('app/src/main/java/') and path.endswith('.java'):
        rel = path[len('app/src/main/java/'):]
        outdir = 'xposed_src/' + os.path.dirname(rel)
        outfile = outdir + '/' + os.path.basename(rel)
        os.makedirs(outdir, exist_ok=True)
        url = f'https://raw.githubusercontent.com/rovo89/XposedBridge/art/{path}'
        try:
            urllib.request.urlretrieve(url, outfile)
        except:
            pass
    elif path.startswith('app/src/main/apacheCommonsLang/') and path.endswith('.java'):
        rel = path[len('app/src/main/apacheCommonsLang/'):]
        outdir = 'xposed_src/external/' + os.path.dirname(rel)
        outfile = outdir + '/' + os.path.basename(rel)
        os.makedirs(outdir, exist_ok=True)
        url = f'https://raw.githubusercontent.com/rovo89/XposedBridge/art/{path}'
        try:
            urllib.request.urlretrieve(url, outfile)
        except:
            pass
"
        echo "Java files downloaded:"
        find xposed_src -name "*.java" | wc -l

    - name: Compile and package Xposed API JAR
      run: |
        mkdir -p xposed_api_stubs
        javac -d xposed_api_stubs \
          xposed_src/de/robv/android/xposed/IXposedMod.java \
          xposed_src/de/robv/android/xposed/IXposedHookLoadPackage.java \
          xposed_src/de/robv/android/xposed/IXposedHookInitPackageResources.java \
          xposed_src/de/robv/android/xposed/IXposedHookZygoteInit.java \
          xposed_src/de/robv/android/xposed/IXposedHookCmdInit.java \
          xposed_src/de/robv/android/xposed/XposedBridge.java \
          xposed_src/de/robv/android/xposed/XposedHelpers.java \
          xposed_src/de/robv/android/xposed/XposedInit.java \
          xposed_src/de/robv/android/xposed/SELinuxHelper.java \
          xposed_src/de/robv/android/xposed/XSharedPreferences.java \
          xposed_src/de/robv/android/xposed/XC_MethodHook.java \
          xposed_src/de/robv/android/xposed/XC_MethodReplacement.java \
          xposed_src/de/robv/android/xposed/callbacks/XCallback.java \
          xposed_src/de/robv/android/xposed/callbacks/IXUnhook.java \
          xposed_src/de/robv/android/xposed/callbacks/XC_LoadPackage.java \
          xposed_src/de/robv/android/xposed/callbacks/XC_InitPackageResources.java \
          xposed_src/de/robv/android/xposed/callbacks/XC_LayoutInflated.java \
          xposed_src/de/robv/android/xposed/callbacks/package-info.java \
          xposed_src/de/robv/android/xposed/package-info.java \
          xposed_src/de/robv/android/xposed/services/BaseService.java \
          xposed_src/de/robv/android/xposed/services/FileResult.java \
          xposed_src/de/robv/android/xposed/services/ZygoteService.java \
          xposed_src/de/robv/android/xposed/services/package-info.java \
          xposed_src/external/org/apache/commons/lang3/CharUtils.java \
          xposed_src/external/org/apache/commons/lang3/ClassUtils.java \
          xposed_src/external/org/apache/commons/lang3/ArrayUtils.java \
          xposed_src/external/org/apache/commons/lang3/CharSequenceUtils.java \
          xposed_src/external/org/apache/commons/lang3/JavaVersion.java \
          2>&1 || echo "Compile done"
        echo "Classes compiled: $(find xposed_api_stubs -name '*.class' | wc -l)"

    - name: Install Xposed JAR to mavenLocal
      run: |
        cd xposed_api_stubs
        jar cf ../api-82.jar de android
        cd ..
        mkdir -p ~/.m2/repository/de/robv/android/xposed/api/82
        cp api-82.jar ~/.m2/repository/de/robv/android/xposed/api/82/
        cat > ~/.m2/repository/de/robv/android/xposed/api/82/api-82.pom << 'POM'
<?xml version="1.0" encoding="UTF-8"?>
<project>
  <modelVersion>4.0.0</modelVersion>
  <groupId>de.robv.android.xposed</groupId>
  <artifactId>api</artifactId>
  <version>82</version>
  <packaging>jar</packaging>
</project>
POM
        echo "=== mavenLocal ==="
        ls -lh ~/.m2/repository/de/robv/android/xposed/api/82/

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Build Release APK
      run: ./gradlew assembleRelease --no-daemon --stacktrace

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: MiTrustBuster-Debug
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 5

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: MiTrustBuster-Release
        path: app/build/outputs/apk/release/*.apk
        retention-days: 5

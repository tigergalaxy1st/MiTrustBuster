name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install Android SDK
        run: |
          mkdir -p "$HOME/android-sdk"
          export ANDROID_HOME="$HOME/android-sdk"
          cd "$HOME"
          curl -fsSL -o cmdline-tools.zip "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
          unzip -q cmdline-tools.zip
          mkdir -p cmdline-tools/latest
          [ -d "cmdline-tools/bin" ] && mv cmdline-tools/bin cmdline-tools/latest/
          [ -d "cmdline-tools/lib" ] && mv cmdline-tools/lib cmdline-tools/latest/
          export PATH="$HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH"
          echo "ANDROID_HOME=$ANDROID_HOME" >> "$GITHUB_ENV"
          yes | $HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-34" "build-tools;34.0.0" "platform-tools" --sdk_root="$ANDROID_HOME"
      - name: Clone XposedBridge and fix Gradle wrapper
        run: |
          git clone --depth 1 https://github.com/rovo89/XposedBridge.git XposedBridge
          cd XposedBridge
          # 鏇挎崲涓?Gradle 8.5 鐨?wrapper.jar (鏃?jar 涓嶆敮鎸?Java 17)
          WRAPPER_JAR_URL="https://raw.githubusercontent.com/tigergalaxy1st/MiTrustBuster/main/gradle/wrapper/gradle-wrapper.jar"
          curl -fsSL -o gradle/wrapper/gradle-wrapper.jar "$WRAPPER_JAR_URL"
          # 鏇挎崲 gradle-wrapper.properties
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip
networkTimeout=10000
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
EOF
          echo "Wrapper upgraded to Gradle 8.5"
          ls -la gradle/wrapper/
          ./gradlew --version
      - name: Build XposedBridge hiddenapistubs
        run: |
          export ANDROID_HOME="$HOME/android-sdk"
          export PATH="$HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH"
          cd XposedBridge
          ./gradlew :hiddenapistubs:assembleRelease --no-daemon -q
          AAR=$(find hiddenapistubs/build -name "*.aar" -type f | head -1)
          echo "Built AAR: $AAR"
          mkdir -p /tmp/xposed
          unzip -o "$AAR" classes.jar -d /tmp/xposed
          mkdir -p ~/.m2/repository/de/robv/android/xposed/api/82
          cp /tmp/xposed/classes.jar ~/.m2/repository/de/robv/android/xposed/api/82/api-82.jar
          echo '<?xml version="1.0" encoding="UTF-8"?><project><modelVersion>4.0.0</modelVersion><groupId>de.robv.android.xposed</groupId><artifactId>api</artifactId><version>82</version><packaging>jar</packaging></project>' > ~/.m2/repository/de/robv/android/xposed/api/82/api-82.pom
          ls -lh ~/.m2/repository/de/robv/android/xposed/api/82/
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon
      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon
      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MiTrustBuster-Debug
          path: app/build/outputs/apk/debug/*.apk
      - name: Upload Release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MiTrustBuster-Release
          path: app/build/outputs/apk/release/*.apk

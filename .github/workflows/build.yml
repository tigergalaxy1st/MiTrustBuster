name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  ANDROID_HOME: /usr/local/lib/android/sdk
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install Android SDK components
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH"
          echo "=== SDK directory ==="
          ls "$ANDROID_HOME/"
          echo "=== Accept licenses ==="
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          echo "=== Install SDK packages ==="
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-34" "build-tools;34.0.0" --sdk_root="$ANDROID_HOME"
          echo "=== Verify ==="
          ls "$ANDROID_HOME/platforms/android-34/android.jar"
      - name: Build XposedBridge API JAR from pure Java sources
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH"
          git clone --depth 1 https://github.com/rovo89/XposedBridge.git XB && cd XB && mv app app_disabled
          mkdir -p api-jar
          cp -r app_disabled/src/main/java/* api-jar/
          find api-jar -name "*.java" > sources.txt
          javac -d api-jar -cp api-jar @sources.txt && echo "javac SUCCESS"
          cd api-jar && mkdir -p ~/.m2/repository/de/robv/android/xposed/api/82
          jar cf ~/.m2/repository/de/robv/android/xposed/api/82/api-82.jar de/robv/android/xposed/
          printf '<?xml version="1.0" encoding="UTF-8"?><project><modelVersion>4.0.0</modelVersion><groupId>de.robv.android.xposed</groupId><artifactId>api</artifactId><version>82</version><packaging>jar</packaging></project>' > ~/.m2/repository/de/robv/android/xposed/api/82/api-82.pom
          jar cf ~/.m2/repository/de/robv/android/xposed/api/82/api-82-sources.jar de/robv/android/xposed/
          ls -lh ~/.m2/repository/de/robv/android/xposed/api/82/
      - name: Fix gradlew permissions
        run: chmod +x gradlew
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon
      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon
      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MiTrustBuster-Debug
          path: app/build/outputs/apk/debug/*.apk
      - name: Upload Release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MiTrustBuster-Release
          path: app/build/outputs/apk/release/*.apk

name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  ANDROID_HOME: /home/runner/android-sdk

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install Android SDK
        run: |
          mkdir -p "$ANDROID_HOME"
          cd "$ANDROID_HOME"
          curl -fsSL -o cmdline-tools.zip "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
          unzip -q cmdline-tools.zip
          mkdir -p cmdline-tools/latest
          [ -d "cmdline-tools/bin" ] && mv cmdline-tools/bin cmdline-tools/latest/
          [ -d "cmdline-tools/lib" ] && mv cmdline-tools/lib cmdline-tools/latest/
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH"
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-34" "build-tools;34.0.0" "platform-tools" --sdk_root="$ANDROID_HOME"
          ls "$ANDROID_HOME/platforms/android-34/android.jar"
      - name: Download and compile XposedBridge API
        run: |
          export ANDROID_HOME=/home/runner/android-sdk
          XB=afcc3e1e788ea44bfd00245a24b5dfe6c86aa3d0
          BASE="https://raw.githubusercontent.com/rovo89/XposedBridge/$XB"
          mkdir -p xposed_build
          dl() { curl -sSL -o "xposed_build/$2" "$BASE/$1" && echo "OK: $1" || echo "SKIP: $1"; }
          dl "app/src/main/java/de/robv/android/xposed/XposedBridge.java" "XposedBridge.java"
          dl "app/src/main/java/de/robv/android/xposed/XposedHelpers.java" "XposedHelpers.java"
          dl "app/src/main/java/de/robv/android/xposed/XposedInit.java" "XposedInit.java"
          dl "app/src/main/java/de/robv/android/xposed/XC_MethodHook.java" "XC_MethodHook.java"
          dl "app/src/main/java/de/robv/android/xposed/XC_MethodReplacement.java" "XC_MethodReplacement.java"
          dl "app/src/main/java/de/robv/android/xposed/XSharedPreferences.java" "XSharedPreferences.java"
          dl "app/src/main/java/de/robv/android/xposed/SELinuxHelper.java" "SELinuxHelper.java"
          dl "app/src/main/java/de/robv/android/xposed/IXposedMod.java" "IXposedMod.java"
          dl "app/src/main/java/de/robv/android/xposed/IXposedHookLoadPackage.java" "IXposedHookLoadPackage.java"
          dl "app/src/main/java/de/robv/android/xposed/IXposedHookZygoteInit.java" "IXposedHookZygoteInit.java"
          dl "app/src/main/java/de/robv/android/xposed/IXposedHookInitPackageResources.java" "IXposedHookInitPackageResources.java"
          dl "app/src/main/java/de/robv/android/xposed/IXposedHookCmdInit.java" "IXposedHookCmdInit.java"
          dl "app/src/main/java/de/robv/android/xposed/callbacks/XCallback.java" "XCallback.java"
          dl "app/src/main/java/de/robv/android/xposed/callbacks/IXUnhook.java" "IXUnhook.java"
          dl "app/src/main/java/de/robv/android/xposed/callbacks/XC_LoadPackage.java" "XC_LoadPackage.java"
          dl "app/src/main/java/de/robv/android/xposed/callbacks/XC_InitPackageResources.java" "XC_InitPackageResources.java"
          dl "app/src/main/java/de/robv/android/xposed/callbacks/XC_LayoutInflated.java" "XC_LayoutInflated.java"
          dl "app/src/main/java/de/robv/android/xposed/services/BaseService.java" "BaseService.java"
          dl "app/src/main/java/de/robv/android/xposed/services/BinderService.java" "BinderService.java"
          dl "app/src/main/java/de/robv/android/xposed/services/DirectAccessService.java" "DirectAccessService.java"
          dl "app/src/main/java/de/robv/android/xposed/services/FileResult.java" "FileResult.java"
          dl "app/src/main/java/de/robv/android/xposed/services/ZygoteService.java" "ZygoteService.java"
          dl "app/src/main/java/android/app/AndroidAppHelper.java" "AndroidAppHelper.java"
          dl "app/src/main/java/android/content/res/XModuleResources.java" "XModuleResources.java"
          dl "app/src/main/java/android/content/res/XResForwarder.java" "XResForwarder.java"
          dl "app/src/main/java/android/content/res/XResources.java" "XResources.java"
          dl "hiddenapistubs/src/main/java/android/app/ActivityThread.java" "ActivityThread.java"
          dl "hiddenapistubs/src/main/java/android/app/LoadedApk.java" "LoadedApk.java"
          dl "hiddenapistubs/src/main/java/android/content/pm/PackageParser.java" "PackageParser.java"
          dl "hiddenapistubs/src/main/java/android/content/res/AssetManager.java" "AssetManager.java"
          dl "hiddenapistubs/src/main/java/android/content/res/CompatibilityInfo.java" "CompatibilityInfo.java"
          dl "hiddenapistubs/src/main/java/android/content/res/Resources.java" "Resources.java"
          dl "hiddenapistubs/src/main/java/android/content/res/TypedArray.java" "TypedArray.java"
          dl "hiddenapistubs/src/main/java/android/os/SELinux.java" "SELinux.java"
          dl "hiddenapistubs/src/main/java/android/os/ServiceManager.java" "ServiceManager.java"
          dl "hiddenapistubs/src/main/java/com/android/internal/os/RuntimeInit.java" "RuntimeInit.java"
          dl "hiddenapistubs/src/main/java/com/android/internal/os/ZygoteInit.java" "ZygoteInit.java"
          dl "hiddenapistubs/src/main/java/com/android/internal/util/XmlUtils.java" "XmlUtils.java"
          dl "hiddenapistubs/src/main/java/xposed/dummy/XResourcesSuperClass.java" "XResourcesSuperClass.java"
          dl "hiddenapistubs/src/main/java/xposed/dummy/XTypedArraySuperClass.java" "XTypedArraySuperClass.java"
          echo "Downloaded $(ls xposed_build/*.java 2>/dev/null | wc -l) Java files"
          javac -source 8 -target 8 -cp "$ANDROID_HOME/platforms/android-34/android.jar" -d xposed_build $(find xposed_build -name '*.java') 2>&1 || true
          mkdir -p ~/.m2/repository/de/robv/android/xposed/api/82
          jar cf ~/.m2/repository/de/robv/android/xposed/api/82/api-82.jar -C xposed_build . 2>/dev/null || echo "jar: no classes compiled"
          printf '<?xml version="1.0" encoding="UTF-8"?><project><modelVersion>4.0.0</modelVersion><groupId>de.robv.android.xposed</groupId><artifactId>api</artifactId><version>82</version><packaging>jar</packaging></project>' > ~/.m2/repository/de/robv/android/xposed/api/82/api-82.pom
          ls -lh ~/.m2/repository/de/robv/android/xposed/api/82/ || echo "No files in mavenLocal"
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon
      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon
      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MiTrustBuster-Debug
          path: app/build/outputs/apk/debug/*.apk
      - name: Upload Release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MiTrustBuster-Release
          path: app/build/outputs/apk/release/*.apk

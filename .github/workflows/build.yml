name: Test JitPack Resolution

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Test dependency resolution
        run: ./gradlew dependencies --configuration compileOnly 2>&1 | grep -i xposed | head -20
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon 2>&1 | tail -30

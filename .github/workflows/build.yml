name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install Android SDK
        run: |
          cd "$HOME"
          curl -fsSL -o cmdline-tools.zip "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
          unzip -q cmdline-tools.zip
          # cmdline-tools 瑙ｅ帇鍚庣洰褰曠粨鏋? cmdline-tools/bin/, cmdline-tools/lib/
          # 闇€瑕佺Щ鍔ㄥ埌 cmdline-tools/latest/bin/, cmdline-tools/latest/lib/
          mkdir -p cmdline-tools/latest
          # 妫€鏌ュ疄闄呯粨鏋?          ls -la cmdline-tools/
          # 绉诲姩鏂囦欢 - cmdline-tools 瀹為檯鍦?cmdline-tools 瀛愮洰褰曞唴
          if [ -d "cmdline-tools/cmdline-tools" ]; then
            mv cmdline-tools/cmdline-tools/* cmdline-tools/latest/
          else
            mv cmdline-tools/bin cmdline-tools/latest/ 2>/dev/null || true
            mv cmdline-tools/lib cmdline-tools/latest/ 2>/dev/null || true
          fi
          ls -la cmdline-tools/latest/
          ls -la cmdline-tools/latest/bin/ 2>/dev/null || echo "No bin dir!"
          # 璁剧疆鐜鍙橀噺
          export ANDROID_HOME="$HOME/android-sdk"
          export PATH="$PATH:$HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools"
          mkdir -p "$ANDROID_HOME"
          # 娴嬭瘯 sdkmanager
          cmdline-tools/latest/bin/sdkmanager --version
          yes | cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          cmdline-tools/latest/bin/sdkmanager --install "platforms;android-34" "build-tools;34.0.0" "platform-tools" --sdk_root="$ANDROID_HOME"
          echo "ANDROID_HOME=$ANDROID_HOME" >> "$GITHUB_ENV"
          echo "PATH=$PATH" >> "$GITHUB_ENV"
      - name: Clone XposedBridge
        run: git clone --depth 1 https://github.com/rovo89/XposedBridge.git XposedBridge
      - name: Build XposedBridge hiddenapistubs
        run: |
          export ANDROID_HOME="$HOME/android-sdk"
          export PATH="$PATH:$HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools"
          cd XposedBridge
          ./gradlew :hiddenapistubs:assembleRelease --no-daemon -q
          AAR=$(find hiddenapistubs/build -name "*.aar" -type f | head -1)
          echo "Built AAR: $AAR"
          mkdir -p /tmp/xposed
          unzip -o "$AAR" classes.jar -d /tmp/xposed
          mkdir -p ~/.m2/repository/de/robv/android/xposed/api/82
          cp /tmp/xposed/classes.jar ~/.m2/repository/de/robv/android/xposed/api/82/api-82.jar
          echo '<?xml version="1.0" encoding="UTF-8"?><project><modelVersion>4.0.0</modelVersion><groupId>de.robv.android.xposed</groupId><artifactId>api</artifactId><version>82</version><packaging>jar</packaging></project>' > ~/.m2/repository/de/robv/android/xposed/api/82/api-82.pom
          ls -lh ~/.m2/repository/de/robv/android/xposed/api/82/
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon
      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: MiTrustBuster-Debug
          path: app/build/outputs/apk/debug/*.apk
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: MiTrustBuster-Release
          path: app/build/outputs/apk/release/*.apk
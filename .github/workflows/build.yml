name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  ANDROID_HOME: /home/runner/android-sdk

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install Android SDK
        run: |
          mkdir -p "$ANDROID_HOME"
          cd "$ANDROID_HOME"
          curl -fsSL -o cmdline-tools.zip "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
          unzip -q cmdline-tools.zip
          mkdir -p cmdline-tools/latest
          [ -d "cmdline-tools/bin" ] && mv cmdline-tools/bin cmdline-tools/latest/
          [ -d "cmdline-tools/lib" ] && mv cmdline-tools/lib cmdline-tools/latest/
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH"
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-34" "build-tools;34.0.0" "platform-tools" --sdk_root="$ANDROID_HOME"
          ls "$ANDROID_HOME/platforms/android-34/android.jar"
      - name: Download XposedBridge Java files
        run: |
          set -e
          export ANDROID_HOME=/home/runner/android-sdk
          XB=afcc3e1e788ea44bfd00245a24b5dfe6c86aa3d0
          mkdir -p xposed_build
          base="https://raw.githubusercontent.com/rovo89/XposedBridge/$XB"
          curl -fsSL -o xposed_build/XposedBridge.java "$base/app/src/main/java/de/robv/android/xposed/XposedBridge.java"
          curl -fsSL -o xposed_build/XposedHelpers.java "$base/app/src/main/java/de/robv/android/xposed/XposedHelpers.java"
          curl -fsSL -o xposed_build/XposedInit.java "$base/app/src/main/java/de/robv/android/xposed/XposedInit.java"
          curl -fsSL -o xposed_build/XC_MethodHook.java "$base/app/src/main/java/de/robv/android/xposed/XC_MethodHook.java"
          curl -fsSL -o xposed_build/XC_MethodReplacement.java "$base/app/src/main/java/de/robv/android/xposed/XC_MethodReplacement.java"
          curl -fsSL -o xposed_build/XSharedPreferences.java "$base/app/src/main/java/de/robv/android/xposed/XSharedPreferences.java"
          curl -fsSL -o xposed_build/SELinuxHelper.java "$base/app/src/main/java/de/robv/android/xposed/SELinuxHelper.java"
          curl -fsSL -o xposed_build/DexCreator.java "$base/app/src/main/java/de/robv/android/xposed/DexCreator.java"
          curl -fsSL -o xposed_build/IXposedMod.java "$base/app/src/main/java/de/robv/android/xposed/IXposedMod.java"
          curl -fsSL -o xposed_build/IXposedHookLoadPackage.java "$base/app/src/main/java/de/robv/android/xposed/IXposedHookLoadPackage.java"
          curl -fsSL -o xposed_build/IXposedHookZygoteInit.java "$base/app/src/main/java/de/robv/android/xposed/IXposedHookZygoteInit.java"
          curl -fsSL -o xposed_build/IXposedHookInitPackageResources.java "$base/app/src/main/java/de/robv/android/xposed/IXposedHookInitPackageResources.java"
          curl -fsSL -o xposed_build/IXposedHookCmdInit.java "$base/app/src/main/java/de/robv/android/xposed/IXposedHookCmdInit.java"
          curl -fsSL -o xposed_build/XCallback.java "$base/app/src/main/java/de/robv/android/xposed/callbacks/XCallback.java"
          curl -fsSL -o xposed_build/IXUnhook.java "$base/app/src/main/java/de/robv/android/xposed/callbacks/IXUnhook.java"
          curl -fsSL -o xposed_build/XC_LoadPackage.java "$base/app/src/main/java/de/robv/android/xposed/callbacks/XC_LoadPackage.java"
          curl -fsSL -o xposed_build/XC_InitPackageResources.java "$base/app/src/main/java/de/robv/android/xposed/callbacks/XC_InitPackageResources.java"
          curl -fsSL -o xposed_build/XC_LayoutInflated.java "$base/app/src/main/java/de/robv/android/xposed/callbacks/XC_LayoutInflated.java"
          curl -fsSL -o xposed_build/BaseService.java "$base/app/src/main/java/de/robv/android/xposed/services/BaseService.java"
          curl -fsSL -o xposed_build/BinderService.java "$base/app/src/main/java/de/robv/android/xposed/services/BinderService.java"
          curl -fsSL -o xposed_build/DirectAccessService.java "$base/app/src/main/java/de/robv/android/xposed/services/DirectAccessService.java"
          curl -fsSL -o xposed_build/FileResult.java "$base/app/src/main/java/de/robv/android/xposed/services/FileResult.java"
          curl -fsSL -o xposed_build/ZygoteService.java "$base/app/src/main/java/de/robv/android/xposed/services/ZygoteService.java"
          curl -fsSL -o xposed_build/AndroidAppHelper.java "$base/app/src/main/java/android/app/AndroidAppHelper.java"
          curl -fsSL -o xposed_build/XModuleResources.java "$base/app/src/main/java/android/content/res/XModuleResources.java"
          curl -fsSL -o xposed_build/XResForwarder.java "$base/app/src/main/java/android/content/res/XResForwarder.java"
          curl -fsSL -o xposed_build/XResources.java "$base/app/src/main/java/android/content/res/XResources.java"
          curl -fsSL -o xposed_build/ActivityThread.java "$base/hiddenapistubs/src/main/java/android/app/ActivityThread.java"
          curl -fsSL -o xposed_build/LoadedApk.java "$base/hiddenapistubs/src/main/java/android/app/LoadedApk.java"
          curl -fsSL -o xposed_build/PackageParser.java "$base/hiddenapistubs/src/main/java/android/content/pm/PackageParser.java"
          curl -fsSL -o xposed_build/AssetManager.java "$base/hiddenapistubs/src/main/java/android/content/res/AssetManager.java"
          curl -fsSL -o xposed_build/CompatibilityInfo.java "$base/hiddenapistubs/src/main/java/android/content/res/CompatibilityInfo.java"
          curl -fsSL -o xposed_build/Resources.java "$base/hiddenapistubs/src/main/java/android/content/res/Resources.java"
          curl -fsSL -o xposed_build/TypedArray.java "$base/hiddenapistubs/src/main/java/android/content/res/TypedArray.java"
          curl -fsSL -o xposed_build/SELinux.java "$base/hiddenapistubs/src/main/java/android/os/SELinux.java"
          curl -fsSL -o xposed_build/ServiceManager.java "$base/hiddenapistubs/src/main/java/android/os/ServiceManager.java"
          curl -fsSL -o xposed_build/RuntimeInit.java "$base/hiddenapistubs/src/main/java/com/android/internal/os/RuntimeInit.java"
          curl -fsSL -o xposed_build/ZygoteInit.java "$base/hiddenapistubs/src/main/java/com/android/internal/os/ZygoteInit.java"
          curl -fsSL -o xposed_build/XmlUtils.java "$base/hiddenapistubs/src/main/java/com/android/internal/util/XmlUtils.java"
          curl -fsSL -o xposed_build/XResourcesSuperClass.java "$base/hiddenapistubs/src/main/java/xposed/dummy/XResourcesSuperClass.java"
          curl -fsSL -o xposed_build/XTypedArraySuperClass.java "$base/hiddenapistubs/src/main/java/xposed/dummy/XTypedArraySuperClass.java"
          echo "Downloaded $(find xposed_build -name '*.java' | wc -l) Java files"
          javac -source 8 -target 8 -cp "$ANDROID_HOME/platforms/android-34/android.jar" -d xposed_build $(find xposed_build -name '*.java') 2>&1 || true
          mkdir -p ~/.m2/repository/de/robv/android/xposed/api/82
          jar cf ~/.m2/repository/de/robv/android/xposed/api/82/api-82.jar -C xposed_build .
          printf '<?xml version="1.0" encoding="UTF-8"?><project><modelVersion>4.0.0</modelVersion><groupId>de.robv.android.xposed</groupId><artifactId>api</artifactId><version>82</version><packaging>jar</packaging></project>' > ~/.m2/repository/de/robv/android/xposed/api/82/api-82.pom
          ls -lh ~/.m2/repository/de/robv/android/xposed/api/82/
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon
      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon
      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MiTrustBuster-Debug
          path: app/build/outputs/apk/debug/*.apk
      - name: Upload Release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MiTrustBuster-Release
          path: app/build/outputs/apk/release/*.apk

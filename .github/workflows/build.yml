name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install Android SDK
        run: |
          mkdir -p "$HOME/android-sdk"
          export ANDROID_HOME="$HOME/android-sdk"
          cd "$HOME"
          curl -fsSL -o cmdline-tools.zip "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
          unzip -q cmdline-tools.zip
          mkdir -p cmdline-tools/latest
          [ -d "cmdline-tools/bin" ] && mv cmdline-tools/bin cmdline-tools/latest/
          [ -d "cmdline-tools/lib" ] && mv cmdline-tools/lib cmdline-tools/latest/
          export PATH="$HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH"
          echo "ANDROID_HOME=$ANDROID_HOME" >> "$GITHUB_ENV"
          yes | $HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-34" "build-tools;34.0.0" "platform-tools" --sdk_root="$ANDROID_HOME"
      - name: Clone XposedBridge (sparse, skip app)
        run: |
          # 鐢?sparse-checkout 鍙厠闅?hiddenapistubs 鐩稿叧鏂囦欢锛岃烦杩?app锛堥伩鍏?SDK 璺緞鍐茬獊锛?          git init XposedBridge
          cd XposedBridge
          git config core.sparseCheckout true
          printf 'hiddenapistubs/\ngradle/\nbuild.gradle\nsettings.gradle\n' > .git/info/sparse-checkout
          git remote add origin https://github.com/rovo89/XposedBridge.git
          git fetch --depth 1 origin master
          git checkout HEAD -- .
          ls -la
          # 鍗囩骇 wrapper 鍒?Gradle 8.5
          curl -fsSL -o gradle/wrapper/gradle-wrapper.jar "https://raw.githubusercontent.com/tigergalaxy1st/MiTrustBuster/main/gradle/wrapper/gradle-wrapper.jar"
          printf 'distributionBase=GRADLE_USER_HOME\ndistributionPath=wrapper/dists\ndistributionUrl=https\\://services.gradle.org/distributions/gradle-8.5-bin.zip\nnetworkTimeout=10000\nzipStoreBase=GRADLE_USER_HOME\nzipStorePath=wrapper/dists\n' > gradle/wrapper/gradle-wrapper.properties
          # 鏇挎崲 build.gradle锛氱敤 google() 鏇夸唬 jcenter()
          printf 'buildscript {\n    repositories {\n        google()\n        mavenCentral()\n    }\n    dependencies {\n        classpath "com.android.tools.build:gradle:8.1.0"\n    }\n}\n\nallprojects {\n    repositories {\n        google()\n        mavenCentral()\n    }\n}\n\ntask clean(type: Delete) {\n    delete rootProject.buildDir\n}\n' > build.gradle
          ./gradlew --version
      - name: Build hiddenapistubs and install to mavenLocal
        run: |
          export ANDROID_HOME="$HOME/android-sdk"
          export PATH="$HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH"
          cd XposedBridge
          ./gradlew :hiddenapistubs:assembleRelease --no-daemon -q
          AAR=$(find hiddenapistubs/build -name "*.aar" -type f | head -1)
          echo "Built AAR: $AAR"
          mkdir -p /tmp/xposed
          unzip -o "$AAR" classes.jar -d /tmp/xposed
          mkdir -p ~/.m2/repository/de/robv/android/xposed/api/82
          cp /tmp/xposed/classes.jar ~/.m2/repository/de/robv/android/xposed/api/82/api-82.jar
          printf '<?xml version="1.0" encoding="UTF-8"?><project><modelVersion>4.0.0</modelVersion><groupId>de.robv.android.xposed</groupId><artifactId>api</artifactId><version>82</version><packaging>jar</packaging></project>' > ~/.m2/repository/de/robv/android/xposed/api/82/api-82.pom
          ls -lh ~/.m2/repository/de/robv/android/xposed/api/82/
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon
      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon
      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MiTrustBuster-Debug
          path: app/build/outputs/apk/debug/*.apk
      - name: Upload Release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MiTrustBuster-Release
          path: app/build/outputs/apk/release/*.apk

name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  ANDROID_HOME: /usr/local/lib/android/sdk
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install Android SDK components
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH"
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-34" "build-tools;34.0.0" --sdk_root="$ANDROID_HOME"
      - name: Install XposedBridge API to mavenLocal
        run: |
          mkdir -p ~/.m2/repository/de/robv/android/xposed/api/82
          curl -fsSL -o ~/.m2/repository/de/robv/android/xposed/api/82/api-82.jar "https://repo1.maven.org/maven2/de/robv/android/xposed/api/82/api-82.jar"
          curl -fsSL -o ~/.m2/repository/de/robv/android/xposed/api/82/api-82-sources.jar "https://repo1.maven.org/maven2/de/robv/android/xposed/api/82/api-82-sources.jar"
          curl -fsSL -o ~/.m2/repository/de/robv/android/xposed/api/82/api-82.pom "https://repo1.maven.org/maven2/de/robv/android/xposed/api/82/api-82.pom"
          ls -lh ~/.m2/repository/de/robv/android/xposed/api/82/
      - name: Fix gradlew permissions
        run: chmod +x gradlew
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon
      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon
      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MiTrustBuster-Debug
          path: app/build/outputs/apk/debug/*.apk
      - name: Upload Release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MiTrustBuster-Release
          path: app/build/outputs/apk/release/*.apk

name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Download Xposed API JAR (with retry)
      run: |
        mkdir -p ~/.m2/repository/de/robv/android/xposed/api/82
        for i in 1 2 3 4 5; do
          echo "Attempt $i..."
          if curl -fsSL -o ~/.m2/repository/de/robv/android/xposed/api/82/api-82.jar \
            "https://xposed.repo.maven.io/maven2/de/robv/android/xposed/api/82/api-82.jar"; then
            echo "JAR downloaded successfully"
            break
          fi
          echo "Failed, retrying in 5s..."
          sleep 5
        done
        for i in 1 2 3 4 5; do
          echo "Attempt $i..."
          if curl -fsSL -o ~/.m2/repository/de/robv/android/xposed/api/82/api-82.pom \
            "https://xposed.repo.maven.io/maven2/de/robv/android/xposed/api/82/api-82.pom"; then
            echo "POM downloaded successfully"
            break
          fi
          echo "Failed, retrying in 5s..."
          sleep 5
        done
        ls -la ~/.m2/repository/de/robv/android/xposed/api/82/

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Build Release APK
      run: ./gradlew assembleRelease

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: MiTrustBuster-Debug
        path: app/build/outputs/apk/debug/*.apk

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: MiTrustBuster-Release
        path: app/build/outputs/apk/release/*.apk
